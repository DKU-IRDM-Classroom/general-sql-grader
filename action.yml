name: "general-sql-grader"
description: "General SQL Grader"
author: "DKU-IRDM-Classroom"

inputs:
  module-path:
    required: true
  sql-path:
    required: false
    default: sql
  time-limit:
    required: false
    default: 5

permissions:
  contents: read
  actions: read
  checks: write

runs:
  using: "composite"
  steps:

    - name: DB 준비
      id: prepare-db
      shell: bash
      run: |
        : DB 준비
        set -euo pipefail

        docker run -d \
          --name db \
          -e POSTGRES_USER=user \
          -e POSTGRES_PASSWORD=password \
          -e POSTGRES_DB=database \
          -p 5432:5432 \
          postgres:16

        for i in {1..30}; do
          if docker exec db pg_isready -U user -d database > /dev/null 2>&1; then
            echo "db ready"
            break
          fi
          sleep 1
        done

        echo "DB_HOST=localhost" >> "$GITHUB_ENV"
        echo "DB_PORT=5432" >> "$GITHUB_ENV"
        echo "DB_NAME=database" >> "$GITHUB_ENV"
        echo "DB_USER=user" >> "$GITHUB_ENV"
        echo "DB_PASSWORD=password" >> "$GITHUB_ENV"

    - name: 환경 준비
      id: prepare-grader
      shell: bash
      run: |
        : 환경 준비
        set -euo pipefail

        mkdir -p "$HOME/workdir"
        chmod 777 "$HOME/workdir"

        pip install -qq --disable-pip-version-check pytest pytest-timeout psycopg2-binary

        if [ -f "${{ inputs.module-path }}/requirements.txt" ]; then
          cp "${{ inputs.module-path }}/requirements.txt" ./
          pip install -r ./requirements.txt
        fi

    - name: 테스트 수집
      id: collect-tests
      shell: bash
      run: |
        : 테스트 수집
        set -euo pipefail

        mkdir -p "$HOME/workdir/sql_student/"
        shopt -s nullglob
        cp "./${{ inputs.sql-path }}/"*.sql "$HOME/workdir/sql_student/" || true

        mkdir -p "$HOME/workdir/sql_answer/"
        cp "${{ inputs.module-path }}/sql_answer/"*.sql "$HOME/workdir/sql_answer/"
        cp "${{ inputs.module-path }}/test_cases.py" "$HOME/workdir/"

        cd "$HOME/workdir"
        pytest test_cases.py --collect-only --quiet > ./nodeids.txt
        grep "::" ./nodeids.txt > tmp && mv tmp ./nodeids.txt
        TOTAL=$(wc -l < ./nodeids.txt)

        echo "TOTAL=$TOTAL" >> "$GITHUB_ENV"

    - name: 채점
      id: grade
      shell: bash
      run: |
        : 채점
        set -euo pipefail

        cd "$HOME/workdir"

        PASS=0

        for n in $(seq 1 ${{ env.TOTAL }}); do

          NODEID=$(sed -n "${n}p" ./nodeids.txt | xargs)
          OUT="./pytest_${n}.log"
          XML="./report_${n}.xml"

          set +e
          pytest "$NODEID" \
            --quiet \
            --tb=no \
            --disable-warnings \
            --timeout=${{ inputs.time-limit }} \
            --timeout-method=thread \
            --junitxml="$XML" \
            >"$OUT" 2>&1
          RC=$?
          set -e

          NODENAME="${NODEID##*::}"
          if [ "$RC" -eq 0 ]; then
            echo "[Case ${n}] PASS <${NODENAME}>"
            PASS=$((PASS+1))
            continue
          fi
          if grep -qi "timeout" "$OUT"; then
            echo "[Case ${n}] Time Limit Exceeded <${NODENAME}>"
          elif [ -f "$XML" ] && grep -qi "timeout" "$XML"; then
            echo "[Case ${n}] Time Limit Exceeded <${NODENAME}>"
          else
            echo "[Case ${n}] FAIL <${NODENAME}>"
          fi

        done

        echo "::notice::점수 ${PASS}/${{ env.TOTAL }}"
        echo "::notice title=Autograding report::{\"totalPoints\":${PASS},\"maxPoints\":${{ env.TOTAL }}}"

    - name: DB 종료
      id: remove-db
      shell: bash
      run: |
        : DB 종료
        set -euo pipefail

        docker rm -f db || true
